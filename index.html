<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ernährungsplan</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
   .meal {
  background: #f8fafc;
  padding: 15px;
  border-radius: 14px;
  margin-top: 20px;
} 
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 30px;
      color: #222;
    }

    .table-wrapper{
  width:100%;
  overflow-x:auto;
}
 
 @media (max-width:600px){

  .button-row{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

}
 
 canvas{
  max-width:100%;
}
    
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      border: 1px solid #e2e6ef;
      padding: 14px;
      text-align: left;
      vertical-align: top;
      line-height: 1.5;
      min-height: 44px;
      font-size: 15px;
    }

    th {
      background: #eef2ff;
    }

    .cellEditor {
      min-height: 24px;
      outline: none;
      display: block;
      line-height: 1.4;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      background: #4f46e5;
      color: white;
      font-weight: bold;
    }

    button.secondary {
      background: #e11d48;
    }

    .totals {
      margin-top: 20px;
      font-weight: bold;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .totals span {
      background: #f1f5f9;
      padding: 8px 12px;
      border-radius: 10px;
    }
    
    
    
  </style>
</head>
<body>

<div class="container">
  <h1>Mein Ernährungsplan</h1>

  <div id="meals"></div>
    


  <div class="controls">
    <button onclick="addMeal()">+ Mahlzeit hinzufügen</button>
    <button class="secondary" onclick="removeRow()">Letzte entfernen</button>
    <button onclick="saveData()">Speichern</button>
    <button onclick="loadData()">Laden</button>
  </div>

  <div class="totals">
    <span id="tgram">G: 0 g</span>
    <span id="tcal">Kalorien: 0</span>
    <span id="tpro">Protein: 0 g</span>
    <span id="tcarb">KH: 0 g</span>
    <span id="tfat">Fett: 0 g</span>
  	
  </div>
</div>

<h2>Gewichtstracker</h2>

<div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;">
  <input id="weightInput" type="number" step="0.1" placeholder="Gewicht (kg)">
  <input id="dateInput" type="date">
  <button onclick="addWeight()">Eintragen</button>
</div>

<canvas id="weightChart" height="120"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

function addFoodRow(tbody, data = []) {
  const row = document.createElement("tr");

  // 5 Spalten: Lebensmittel, Kalorien, Protein, KH, Fett
  for (let i = 0; i < 6; i++) {
    const td = document.createElement("td");

    const editor = document.createElement("div");
    editor.contentEditable = true;
    editor.className = "cellEditor";
    editor.innerText = data[i] || "";

    // EventListener hinzufügen, damit bei jeder Eingabe die Gesamtsummen aktualisiert werden
    editor.addEventListener("input", updateTotals);

    td.appendChild(editor);
    row.appendChild(td);
  }

  tbody.appendChild(row);

  // Gesamtwerte direkt nach dem Hinzufügen aktualisieren
  updateTotals();
}

function addMeal() {
  const container = document.getElementById("meals");

  const meal = document.createElement("div");
  meal.className = "meal";

  const title = document.createElement("h2");
  title.contentEditable = true;          // <- Titel editierbar machen
  title.innerText = "Mahlzeit " + (container.children.length + 1);

 const tableWrapper = document.createElement("div");
tableWrapper.className = "table-wrapper";

const table = document.createElement("table");
table.innerHTML = `
  <thead>
    <tr>
      <th>Lebensmittel</th>
      <th>Gramm</th>
      <th>Kalorien</th>
      <th>Protein</th>
      <th>KH</th>
      <th>Fett</th>
    </tr>
  </thead>
  <tbody></tbody>
`;

tableWrapper.appendChild(table); 
  
  const tbody = table.querySelector("tbody");

  const addBtn = document.createElement("button");
  addBtn.innerText = "+ Lebensmittel";
  addBtn.onclick = () => addFoodRow(tbody);

  const removeBtn = document.createElement("button");
  removeBtn.innerText = "Mahlzeit löschen";
  removeBtn.className = "secondary";
  removeBtn.onclick = () => meal.remove();

  meal.appendChild(title);
  meal.appendChild(tableWrapper);
  meal.appendChild(addBtn);
  meal.appendChild(removeBtn);

  container.appendChild(meal);

  addFoodRow(tbody);
}
function addRow(data = []) {
  const row = document.createElement("tr");

  for (let i = 0; i < 6; i++) {
    const cell = document.createElement("td");

    const editor = document.createElement("div");
    editor.contentEditable = true;
    editor.className = "cellEditor";
    editor.innerText = data[i] || "";
    editor.addEventListener("input", updateTotals);

    cell.appendChild(editor);
    row.appendChild(cell);
  }

  tbody.appendChild(row);
}

function removeRow() {
  const meals = document.querySelectorAll(".meal");

  if (!meals.length) return;

  // Letzte Mahlzeit holen
  const lastMeal = meals[meals.length - 1];
  const tbody = lastMeal.querySelector("tbody");

  if (tbody && tbody.lastElementChild) {
    tbody.removeChild(tbody.lastElementChild);
  }

  updateTotals();
}
function number(val){
  const n = parseFloat(val.replace(",","."));
  return isNaN(n) ? 0 : n;
}

function updateTotals(){
  let cal = 0, pro = 0, carb = 0, fat = 0;

  // Alle Mahlzeiten-Tabellen durchlaufen
  document.querySelectorAll(".meal table tbody").forEach(tbody => {
    [...tbody.rows].forEach(r => {
      cal += number(r.cells[2].innerText);  // Kalorien = 2. Spalte
      pro += number(r.cells[3].innerText);  // Protein = 3. Spalte
      carb += number(r.cells[4].innerText); // KH = 4. Spalte
      fat += number(r.cells[5].innerText);  // Fett = 5. Spalte
    });
  });

  document.getElementById("tcal").innerText = "Kalorien: " + cal;
  document.getElementById("tpro").innerText = "Protein: " + pro + " g";
  document.getElementById("tcarb").innerText = "KH: " + carb + " g";
  document.getElementById("tfat").innerText = "Fett: " + fat + " g";
}
function saveData() {
  const allMeals = [];
  document.querySelectorAll(".meal").forEach(meal => {
    const mealName = meal.querySelector("h2").innerText; // Name speichern
    const mealData = [];
    meal.querySelectorAll("tbody tr").forEach(row => {
      const rowData = [...row.cells].map(c => c.innerText);
      mealData.push(rowData);
    });
    allMeals.push({ name: mealName, rows: mealData });
  });
  localStorage.setItem("ernaehrungsplan", JSON.stringify(allMeals));
  alert("Gespeichert ✔");
}

function loadData() {
  const data = JSON.parse(localStorage.getItem("ernaehrungsplan") || "[]");
  const container = document.getElementById("meals");
  container.innerHTML = "";

  data.forEach((mealDataObj, i) => {
    addMeal();
    const meal = container.children[i];
    meal.querySelector("h2").innerText = mealDataObj.name; // Name wiederherstellen

    const tbody = meal.querySelector("tbody");
    tbody.innerHTML = "";
    mealDataObj.rows.forEach(rowData => addFoodRow(tbody, rowData));
  });

  updateTotals();
}


let weightChart;

function getWeights(){
  return JSON.parse(localStorage.getItem("weights") || "[]");
}

function saveWeights(data){
  localStorage.setItem("weights", JSON.stringify(data));
}

function addWeight(){
  const wInput = document.getElementById("weightInput");
  const dInput = document.getElementById("dateInput");

  const w = parseFloat(wInput.value);
  const d = dInput.value;

  if(isNaN(w) || !d){
    alert("Bitte Gewicht und Datum eingeben");
    return;
  }

  const data = getWeights();
  data.push({date:d, weight:w});

  data.sort((a,b)=> new Date(a.date)-new Date(b.date));

  saveWeights(data);

  // Eingabefelder leeren (fühlt sich besser an)
  wInput.value = "";

  renderWeightChart();
}

function renderWeightChart(){
  const data = getWeights();

  const labels = data.map(x=>x.date);
  const values = data.map(x=>x.weight);

  const ctx = document.getElementById("weightChart");

  if(weightChart) weightChart.destroy();

  weightChart = new Chart(ctx,{
    type:"line",
    data:{
      labels,
      datasets:[{
        label:"Gewicht (kg)",
        data:values,
        tension:0.25
      }]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{display:true}
      }
    }
  });
}

// Beim Laden anzeigen
renderWeightChart();

</script>

</body>
</html>
